<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Interbanking</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 320px;
        }
        h2 {
            margin-top: 0;
            color: #1F4E79;
        }
        label {
            font-size: 13px;
            color: #555;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 4px 0 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #1F4E79;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #163d61;
        }
        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 12px;
            background: #fff0f0;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ffcccc;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Interbanking Reportes</h2>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Usuario</label>
            <input type="text" name="usuario" required autofocus>
            <label>Contraseña</label>
            <input type="password" name="password" required>
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>
</html>
